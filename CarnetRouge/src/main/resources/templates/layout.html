<!DOCTYPE html>
<html lang="fr" data-theme="dark"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#dc2626" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title layout:title-pattern="$content-title | CarnetRouge">CarnetRouge</title>

    <!-- PWA Manifest -->
    <link rel="manifest" th:href="@{/manifest.json}" />

    <!-- Icône Apple -->
    <link rel="apple-touch-icon" th:href="@{/icon.png}" />

    <!-- Polices & Icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" />

    <!-- CSS principal -->
    <link rel="stylesheet" th:href="@{/css/output.css}" />

    <!-- Slot CSS supplémentaire par page -->
    <th:block layout:fragment="head-extra"></th:block>
</head>
<body class="bg-bg text-gray-100 font-sans min-h-screen relative">

<!-- Contenu injecté par chaque page -->
<main layout:fragment="content"></main>

<!-- Slot JS supplémentaire par page -->
<th:block layout:fragment="scripts-extra"></th:block>

<!-- Enregistrement Service Worker PWA -->
<script th:inline="javascript">
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register(/*[[@{/sw.js}]]*/, { scope: '/' })
                .then(reg => console.log('SW enregistré, scope :', reg.scope))
                .catch(err => console.error('Erreur SW :', err));
        });
    }
</script>

</body>
</html>
