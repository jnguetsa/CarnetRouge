<!DOCTYPE html>
<html lang="fr" data-theme="dark"
      xmlns:th="http://www.thymeleaf.org"

      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>CarnetRouge - Page introuvable</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center">

<div class="text-center px-6">

    <!-- Icône -->
    <div class="flex justify-center mb-6">
        <div class="w-24 h-24 bg-red-700 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                 fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <path d="m15 9-6 6"/>
                <path d="m9 9 6 6"/>
            </svg>
        </div>
    </div>

    <!-- Code erreur -->
    <h1 class="text-9xl font-extrabold text-red-500 mb-2">404</h1>

    <!-- Message -->
    <h2 class="text-2xl font-bold text-base-content mb-3">Page introuvable</h2>
    <p class="text-base-content/60 max-w-md mx-auto mb-8">
        La page que vous recherchez n'existe pas ou a été déplacée.
    </p>

    <!-- Boutons -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center">

        <!-- Retour arrière -->
        <button onclick="history.back()"
                class="btn btn-outline border-red-700 text-red-400 hover:bg-red-700 hover:text-white hover:border-red-700">
            ← Retour
        </button>

        <!-- Vers le dashboard si connecté -->
        <a sec:authorize="isAuthenticated()"
           th:href="@{/admin/dashboard}"
           class="btn bg-red-700 hover:bg-red-600 text-white border-none">
            Tableau de bord
        </a>

        <!-- Vers le login si non connecté -->
        <a sec:authorize="isAnonymous()"
           th:href="@{/login}"
           class="btn bg-red-700 hover:bg-red-600 text-white border-none">
            Se connecter
        </a>

    </div>

    <!-- Logo en bas -->
    <div class="mt-12 flex items-center justify-center gap-2 text-base-content/40">
        <div class="w-5 h-5 bg-red-700 rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24"
                 fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/>
            </svg>
        </div>
        <span class="text-sm">CarnetRouge</span>
    </div>

</div>
<div layout:fragment="content"></div>

</body>
</html>
