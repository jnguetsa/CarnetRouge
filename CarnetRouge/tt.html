<!DOCTYPE html>
<html lang="fr" data-theme="dark"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarnetRouge - Gestion des Utilisateurs</title>
    <link rel="stylesheet" th:href="@{/css/output.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>

<body class="bg-base-200 min-h-screen">

<div class="navbar bg-base-100 shadow-lg px-6">
    <div class="flex-1">
        <a th:href="@{/dashboard}" class="flex items-center gap-3 cursor-pointer">
            <div class="w-8 h-8 bg-red-700 rounded-full flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/></svg>
            </div>
            <span class="text-xl font-bold text-red-500">CarnetRouge</span>
        </a>
    </div>
    <div class="flex-none gap-3">
        <span class="text-sm text-base-content/70" sec:authentication="name"></span>
        <div class="badge badge-error">Admin</div>
        <a th:href="@{/logout}" class="btn btn-sm bg-red-700 hover:bg-red-600 text-white border-none">Déconnexion</a>
    </div>
</div>

<div class="container mx-auto p-6">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold">Personnel <span class="text-red-500">Enseignant & Assistant</span></h1>
            <p class="text-base-content/60 mt-1">Gérez les accès et les informations du personnel.</p>
        </div>
        <div class="stats shadow bg-base-100">
            <div class="stat py-2 px-4">
                <div class="stat-title text-xs">Total Utilisateurs</div>
                <div class="stat-value text-xl text-red-500" th:text="${utilisateurs.totalElements}">0</div>
            </div>
        </div>
    </div>

    <div class="card bg-base-100 shadow-xl mb-8">
        <div class="card-body p-6">
            <form th:action="@{/admin/utilisateurs}" method="get" class="grid grid-cols-1 md:grid-cols-12 gap-4">
                <div class="md:col-span-5 flex flex-col gap-2">
                    <span class="text-xs font-bold uppercase opacity-50">Recherche</span>
                    <div class="join w-full">
                        <input type="text" name="recherche" th:value="${recherche}" placeholder="Nom, email..." class="input input-bordered join-item w-full shadow-inner" />
                        <button type="submit" class="btn btn-square bg-red-700 border-none join-item">
                            <i class="bi bi-search text-white"></i>
                        </button>
                    </div>
                </div>

                <div class="md:col-span-3 flex flex-col gap-2">
                    <span class="text-xs font-bold uppercase opacity-50">Type d'utilisateur</span>
                    <select name="type" class="select select-bordered w-full shadow-inner">
                        <option value="TOUS" th:selected="${typeSelectionne == 'TOUS'}">Tous les types</option>
                        <option value="ENS" th:selected="${typeSelectionne == 'ENS'}">Enseignants</option>
                        <option value="ASS" th:selected="${typeSelectionne == 'ASS'}">Assistants</option>
                    </select>
                </div>

                <div class="md:col-span-4 flex items-end gap-2">
                    <button type="submit" class="btn bg-red-700 hover:bg-red-600 text-white border-none flex-1">
                        <i class="bi bi-filter"></i> Filtrer
                    </button>
                    <a th:href="@{/admin/utilisateurs}" class="btn btn-outline border-base-content/20">
                        <i class="bi bi-arrow-clockwise"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div class="card bg-base-100 shadow-xl overflow-hidden">
        <div class="overflow-x-auto">
            <table class="table table-zebra w-full">
                <thead class="bg-base-300/50">
                <tr class="text-base-content/70">
                    <th>Utilisateur</th>
                    <th>Contact</th>
                    <th class="text-center">Type</th>
                    <th>Spécifications</th>
                    <th>Statut</th>
                    <th class="text-right">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${utilisateurs.content}" class="hover">
                    <td>
                        <div class="flex items-center gap-3">
                            <div class="avatar placeholder">
                                <div class="bg-red-700/10 text-red-500 rounded-lg w-10">
                                    <span class="text-xs font-bold" th:text="${#strings.substring(u.nom,0,1)}">U</span>
                                </div>
                            </div>
                            <div>
                                <div class="font-bold" th:text="${u.nom + ' ' + u.prenom}">Nom</div>
                                <div class="text-xs opacity-50" th:text="${'ID: #' + u.id}">#123</div>
                            </div>
                        </div>
                    </td>
                    <td class="text-sm opacity-80" th:text="${u.email}">email@test.com</td>
                    <td class="text-center">
                        <div th:if="${u.type == 'ENS'}" class="badge badge-warning badge-sm font-bold">ENS</div>
                        <div th:if="${u.type == 'ASS'}" class="badge badge-info badge-sm font-bold">ASS</div>
                    </td>
                    <td class="text-xs">
                        <div th:if="${u.type == 'ENS'}" class="flex flex-col gap-1">
                            <span><span class="opacity-50 uppercase">Grade:</span> <span class="font-bold" th:text="${u.grade}">-</span></span>
                            <span><span class="opacity-50 uppercase">Cat:</span> <span class="font-bold" th:text="${u.typeEnseignant}">-</span></span>
                        </div>
                        <div th:if="${u.type == 'ASS'}">
                            <span><span class="opacity-50 uppercase">Fonction:</span> <span class="font-bold" th:text="${u.fonction}">-</span></span>
                        </div>
                    </td>
                    <td>
                        <div th:if="${u.active}" class="flex items-center gap-2 text-success font-bold text-xs uppercase">
                            <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span> Actif
                        </div>
                        <div th:unless="${u.active}" class="flex items-center gap-2 text-error font-bold text-xs uppercase opacity-70">
                            <span class="w-2 h-2 rounded-full bg-error"></span> Inactif
                        </div>
                    </td>
                    <td class="text-right">
                        <div class="flex justify-end gap-1">
                            <button class="btn btn-ghost btn-xs text-info"><i class="bi bi-pencil-square"></i></button>
                            <button class="btn btn-ghost btn-xs text-error"><i class="bi bi-trash3"></i></button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div th:if="${utilisateurs.totalPages > 1}" class="flex justify-center mt-8">
        <div class="join shadow-sm">
            <a th:each="i : ${#numbers.sequence(0, utilisateurs.totalPages - 1)}"
               th:href="@{/admin/utilisateurs(page=${i}, recherche=${recherche}, type=${typeSelectionne})}"
               th:text="${i + 1}"
               class="join-item btn btn-sm"
               th:classappend="${i == utilisateurs.number} ? 'btn-error' : 'bg-base-100'">
            </a>
        </div>
    </div>
</div>

</body>
</html>
